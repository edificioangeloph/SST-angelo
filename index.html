<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema SG-SST</title>
    <link rel="stylesheet" href="css/styles.css">

    <!-- Firebase v9 compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <!-- ═══ PANTALLA DE CARGA ═══ -->
    <div id="loading-screen">
        <div class="loader-box">
            <div class="loader-spinner"></div>
            <p>Cargando sistema SG-SST...</p>
        </div>
    </div>

    <!-- ═══ APP PRINCIPAL (pública — siempre visible después de cargar) ═══ -->
    <div id="main-app" class="hidden">

        <!-- Header -->
        <header class="main-header">
            <div class="header-inner">
                <button id="btn-sidebar-open" class="btn-icon-header" title="Menú">☰</button>
                <div class="header-center">
                    <span id="header-emoji">🏢</span>
                    <div>
                        <h1 id="header-nombre">Edificio</h1>
                        <p id="header-nit" class="header-sub"></p>
                    </div>
                </div>
                <div class="header-right">
                    <span id="header-mes-anio" class="header-date"></span>
                    <span id="admin-badge" class="hidden" style="font-size:0.75rem;background:rgba(255,255,255,0.2);padding:3px 9px;border-radius:12px;margin-right:6px;color:#fff;">🔓 Admin</span>
                    <button id="btn-logout" class="btn-logout-header hidden" title="Cerrar sesión">🚪</button>
                </div>
            </div>
        </header>

        <!-- Sidebar -->
        <div id="sidebar-overlay" class="sidebar-overlay hidden" onclick="cerrarSidebar()"></div>
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <span id="sb-emoji">🏢</span>
                <div>
                    <strong id="sb-nombre">Edificio</strong>
                    <small id="sb-usuario"></small>
                </div>
                <button onclick="cerrarSidebar()" class="btn-icon">✕</button>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-section="dashboard">
                    <span class="nav-icon">📊</span> Dashboard
                </button>
                <button class="nav-item" data-section="documentos">
                    <span class="nav-icon">📁</span> Documentos SG-SST
                </button>
                <button class="nav-item" data-section="ejecucion">
                    <span class="nav-icon">✅</span> Ejecución 2026 <span style="font-size:0.7rem;opacity:0.7;">🔐</span>
                </button>
                <button class="nav-item nav-admin" data-section="herramientas">
                    <span class="nav-icon">🔧</span> Herramientas Admin <span style="font-size:0.7rem;opacity:0.7;">🔐</span>
                </button>
                <button class="nav-item" data-section="cotizaciones">
                    <span class="nav-icon">💼</span> Cotizaciones SST
                </button>
                <button class="nav-item" data-section="habeas-data">
                    <span class="nav-icon">🔒</span> Habeas Data
                </button>
            </nav>
            <div class="sidebar-footer">
                <button id="btn-logout-sb" class="btn-logout-sb hidden">🚪 Cerrar sesión</button>
                <p class="compliance-tag">Compliance Pro · 2026</p>
            </div>
        </aside>

        <!-- Barra de navegación por tabs (desktop) -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-section="dashboard">📊 Dashboard</button>
            <button class="tab-btn" data-section="documentos">📁 Documentos</button>
            <button class="tab-btn" data-section="ejecucion">✅ Ejecución 2026</button>
            <button class="tab-btn tab-admin" data-section="herramientas">🔧 Herramientas</button>
            <button class="tab-btn" data-section="cotizaciones">💼 Cotizaciones</button>
            <button class="tab-btn" data-section="habeas-data">🔒 Habeas Data</button>
        </nav>

        <!-- Contenido principal -->
        <main id="main-content">
            <div class="container">
                <section id="section-dashboard"    class="content-section active"></section>
                <section id="section-documentos"   class="content-section hidden"></section>
                <section id="section-ejecucion"    class="content-section hidden"></section>
                <section id="section-herramientas" class="content-section hidden"></section>
                <section id="section-cotizaciones" class="content-section hidden"></section>
                <section id="section-habeas-data"  class="content-section hidden"></section>
            </div>
        </main>

        <footer class="main-footer">
            Responsable: Carla Castellano Madriz | C.E. 679955 | © 2026 — Compliance Pro
            &nbsp;·&nbsp;
            <button class="btn-link-footer" onclick="window.mostrarSeccion('habeas-data')">🔒 Habeas Data — Ley 1581/2012</button>
        </footer>
    </div>

    <!-- ═══ MODAL LOGIN (solo para secciones protegidas) ═══ -->
    <div id="modal-login" class="modal-overlay hidden">
        <div class="modal-box" style="max-width:380px;">
            <div class="modal-header">
                <h3>🔐 Área de Administración</h3>
                <button class="btn-icon" onclick="cerrarModalLogin()">✕</button>
            </div>
            <p style="color:var(--text-gray);margin-bottom:16px;font-size:0.88rem;">
                Esta sección es exclusiva para la administración del edificio.
            </p>
            <form id="modal-login-form" autocomplete="off">
                <div class="form-group">
                    <label for="modal-login-user">Usuario</label>
                    <input type="text" id="modal-login-user" placeholder="usuario" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="modal-login-pass">Contraseña</label>
                    <input type="password" id="modal-login-pass" placeholder="••••••••" required>
                </div>
                <div id="modal-login-error" class="error-msg hidden"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="cerrarModalLogin()">Cancelar</button>
                    <button type="submit" class="btn-primary">Ingresar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast notificación -->
    <div id="toast" class="toast hidden"></div>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/documentos.js"></script>
    <script src="js/ejecucion.js"></script>
    <script src="js/herramientas.js"></script>
    <script src="js/cotizaciones.js"></script>
    <script src="js/habeas-data.js"></script>
</body>
</html>
